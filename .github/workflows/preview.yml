name: Preview

on:
  push:
    branches: [main]

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: Uj_o5HUyMYlIueepFMvlKJr3M0MgX1EyBCr_EH5s # ${{ secrets['EXPO_TOKEN'] }}
    steps:
      - name: 🏗 Setup repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: npm

      - name: 📦 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🚀 Publish update
        run: eas update --branch preview --message "Update from GitHub Actions"
